<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker - Home</title>
    <!-- daisyUi and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- styles -->
    <link rel="stylesheet" href="styles/style.css">
    <!-- fav icon -->
     <link rel="shortcut icon" href="./assets/github-round-svgrepo-com.svg" type="image/x-icon">
</head>

<body class="">
   <nav>
    <div class="navbar bg-base-100 shadow-sm justify-between px-14 flex-col md:flex-row ">
        <div class="mb-4 md:mb-0">
            <a class="flex justify-center items-center gap-2 text-xl font-bold"><img src="./assets/github-logo.png" alt="" width="36px"><span class="text-sm md:text-xl">GitHub Issues Tracker</span></a>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search-input" type="search" required placeholder="Search"/>
            </label>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </div>
   </nav>
   <main>
        <section class="bg-white border-base-300 rounded-md shadow-md md:w-11/12 mx-auto mt-16 p-4 flex flex-col md:flex-row gap-4">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </section>
        <section class="bg-white border-base-300 rounded-md shadow-md md:w-11/12 mx-auto mt-5 p-4 space-x-3">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex gap-4">
                    <div>
                    <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                    <h3 class="font-semibold text-xl"><span id="issue-counter">0</span> Issues</h3>
                    <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex justify-center items-center gap-2">
                    <img src="./assets/green-dot.png" alt="">
                    <p class="text-sm">Open</p>
                    <img src="./assets/purple-dot.png" alt="">
                    <p class="text-sm">Closed</p>
                </div>
            </div>
            <section id="spinner" class="hidden flex justify-center items-center mt-16">
                <span class="loading loading-spinner loading-xl"></span>
            </section>
            <!-- <button class="btn btn-primary" onclick="my_modal_5.showModal()">Open Issue Modal</button> -->
            
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box max-w-2xl">
                <div id="details-container"> </div>
                        <div class="modal-action m-0">
                            <form method="dialog">
                                <button class="btn btn-primary">Close</button>
                            </form>
                        </div>
                </div>
            </dialog>
        
        <section id="cards-section" class=" bg-gray-100 p-2 md:p-4 shadow-sm  mt-5 rounded-sm grid grid-cols-1  md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            
        </section>
        </section>
   
   </main>
    <script src="scripts/home.js"></script>
</body>

</html>
